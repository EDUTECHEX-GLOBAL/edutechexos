<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduTechExOS Active Watch</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F8FAFC;
      color: #0F172A;
      font-size: 13px;
    }

    .header {
      background: #0F172A;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-logo {
      width: 28px; height: 28px;
      border-radius: 7px;
      background: #0D9488;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .header-name { font-size: 13px; font-weight: 700; color: #F1F5F9; }
    .header-sub  { font-size: 10px; color: #475569; margin-top: 1px; }
    .status-dot  {
      margin-left: auto; width: 8px; height: 8px;
      border-radius: 50%; background: #94A3B8; flex-shrink: 0;
    }
    .status-dot.active  { background: #10B981; box-shadow: 0 0 6px #10B98180; }
    .status-dot.idle    { background: #F59E0B; }
    .status-dot.offline { background: #EF4444; }

    /* Login */
    #login-view { padding: 20px 16px; }
    .login-title { font-size: 14px; font-weight: 700; color: #0F172A; margin-bottom: 4px; }
    .login-sub   { font-size: 11px; color: #64748B; margin-bottom: 16px; }
    .field label { font-size: 11px; font-weight: 600; color: #64748B; display: block; margin-bottom: 4px; }
    .field input {
      width: 100%; padding: 8px 10px; border-radius: 7px;
      border: 1.5px solid #E2E8F0; font-size: 12px; color: #0F172A;
      background: #fff; outline: none; margin-bottom: 10px;
    }
    .field input:focus { border-color: #0D9488; }
    .btn-primary {
      width: 100%; padding: 9px; background: #0D9488; color: #fff;
      border: none; border-radius: 7px; font-size: 12px; font-weight: 700;
      cursor: pointer;
    }
    .btn-primary:hover { background: #0B7A6E; }
    .err { font-size: 11px; color: #EF4444; margin-top: 8px; display: none; }

    /* Main */
    #main-view { display: none; }

    .section { padding: 12px 14px; border-bottom: 1px solid #F1F5F9; }

    .curr-label {
      font-size: 9.5px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: #94A3B8; margin-bottom: 6px;
    }
    .curr-domain {
      font-size: 13px; font-weight: 700; color: #0D9488;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .curr-title {
      font-size: 11px; color: #64748B; margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .stat-row { display: flex; gap: 8px; margin-top: 4px; }
    .stat {
      flex: 1; background: #F8FAFC; border: 1px solid #E2E8F0;
      border-radius: 8px; padding: 8px 10px; text-align: center;
    }
    .stat-val { font-size: 18px; font-weight: 700; color: #0F172A; line-height: 1; }
    .stat-lbl { font-size: 9px; color: #94A3B8; margin-top: 2px; }

    .idle-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px; font-size: 10.5px; font-weight: 600;
      margin-top: 8px;
    }
    .idle-badge.active  { background: #F0FDF9; color: #059669; }
    .idle-badge.idle    { background: #FFFBEB; color: #D97706; }
    .idle-badge.locked  { background: #FEF2F2; color: #DC2626; }

    .sync-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-bottom: 1px solid #F1F5F9;
    }
    .sync-info { font-size: 10.5px; color: #64748B; }
    .sync-info strong { color: #0F172A; }
    .btn-sync {
      padding: 5px 12px; background: #0F172A; color: #fff;
      border: none; border-radius: 6px; font-size: 10.5px; font-weight: 600;
      cursor: pointer;
    }
    .btn-sync:hover { background: #1E293B; }

    .footer {
      padding: 10px 14px; display: flex; align-items: center; justify-content: space-between;
    }
    .user-info { font-size: 11px; color: #64748B; }
    .user-info strong { color: #0F172A; display: block; }
    .btn-logout {
      font-size: 11px; font-weight: 600; color: #EF4444; background: none;
      border: 1px solid #FECACA; border-radius: 6px; padding: 4px 10px; cursor: pointer;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">EX</div>
  <div>
    <div class="header-name">Active Watch</div>
    <div class="header-sub">EduTechExOS</div>
  </div>
  <div class="status-dot" id="status-dot"></div>
</div>

<!-- LOGIN -->
<div id="login-view">
  <div class="login-title" style="margin-top:16px;">Connect your account</div>
  <div class="login-sub">Sign in to start tracking your activity.</div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email-input" placeholder="you@example.com" />
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password-input" placeholder="••••••••" />
  </div>
  <button class="btn-primary" id="login-btn">Connect</button>
  <div class="err" id="login-err"></div>
</div>

<!-- MAIN -->
<div id="main-view">
  <div class="section">
    <div class="curr-label">Currently viewing</div>
    <div class="curr-domain" id="curr-domain">—</div>
    <div class="curr-title" id="curr-title">—</div>
    <div id="idle-badge" class="idle-badge active">
      <span id="idle-dot" style="width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block;"></span>
      <span id="idle-text">Active</span>
    </div>
  </div>

  <div class="section">
    <div class="stat-row">
      <div class="stat">
        <div class="stat-val" id="stat-pending">0</div>
        <div class="stat-lbl">Pending events</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stat-sync">—</div>
        <div class="stat-lbl">Last sync</div>
      </div>
    </div>
  </div>

  <div class="sync-row">
    <div class="sync-info">
      Status: <strong id="sync-status">—</strong>
    </div>
    <button class="btn-sync" id="sync-btn">Sync now</button>
  </div>

  <div class="footer">
    <div class="user-info">
      <strong id="user-name-display">—</strong>
      <span id="user-email-display">—</span>
    </div>
    <button class="btn-logout" id="logout-btn">Disconnect</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
