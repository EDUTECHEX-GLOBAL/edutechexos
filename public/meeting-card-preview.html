<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Cards — Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 30% 20%, #0f1b3d 0%, #070b18 60%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 50px 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      flex-wrap: wrap;
    }

    /* ── Shared animations ── */
    @keyframes slideIn   { from{opacity:0;transform:translateY(14px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes liveDot   { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.45;transform:scale(0.7)} }
    @keyframes ring      { 0%{transform:scale(0.8);opacity:0.8} 100%{transform:scale(2.4);opacity:0} }
    @keyframes shimmer   { 0%{background-position:-200% center} 100%{background-position:200% center} }
    @keyframes float     { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    @keyframes calPulse  { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .col { display:flex; flex-direction:column; align-items:center; gap:12px; }
    .col-label {
      font-size: 10px; font-weight: 800; letter-spacing: .12em;
      text-transform: uppercase; color: rgba(255,255,255,0.28);
    }

    /* ── Card shell ── */
    .card {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: linear-gradient(160deg, #0d1117 0%, #0a1628 55%, #0d1535 100%);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 0 0 1px rgba(26,115,232,0.12),
        0 24px 56px rgba(0,0,0,0.60),
        0 4px 16px rgba(26,115,232,0.08),
        inset 0 1px 0 rgba(255,255,255,0.06);
      animation: slideIn 0.38s cubic-bezier(0.16,1,0.3,1) both;
    }
    .card-started  { width: 348px; }
    .card-scheduled { width: 320px; }

    /* top stripe */
    .stripe {
      position: absolute; top:0; left:0; right:0; height:3px;
      background: linear-gradient(90deg,#4285F4 0%,#EA4335 33%,#FBBC04 66%,#34A853 100%);
    }
    /* glows */
    .glows {
      position:absolute; inset:0; pointer-events:none;
      background:
        radial-gradient(ellipse 80% 60% at 15% 0%,rgba(26,115,232,0.13) 0%,transparent 70%),
        radial-gradient(ellipse 60% 50% at 90% 100%,rgba(52,168,83,0.09) 0%,transparent 65%);
    }
    /* close btn */
    .close-btn {
      position:absolute;top:12px;right:12px;z-index:10;
      width:28px;height:28px;border-radius:8px;border:none;
      background:rgba(255,255,255,0.06);cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      color:rgba(255,255,255,0.40);transition:background .15s,color .15s;
    }
    .close-btn:hover{background:rgba(234,67,53,0.18);color:#EA4335;}

    .body { position:relative;z-index:1; }
    .body-started    { padding:20px 18px 18px; }
    .body-scheduled  { padding:18px 16px 16px; }

    /* header */
    .header { display:flex;align-items:flex-start;gap:13px;margin-bottom:16px; }
    .header-scheduled { display:flex;align-items:center;gap:12px;margin-bottom:14px; }

    /* icon */
    .icon-wrap { position:relative;flex-shrink:0;animation:float 3s ease-in-out infinite; }
    .ring1,.ring2 {
      position:absolute;inset:-6px;border-radius:50%;
      border:1.5px solid rgba(26,115,232,0.35);
    }
    .ring1{animation:ring 2.2s ease-out infinite;}
    .ring2{animation:ring 2.2s ease-out 0.7s infinite;}
    .ring1s{position:absolute;inset:-5px;border-radius:50%;border:1.5px solid rgba(26,115,232,0.30);animation:ring 2.4s ease-out infinite;}
    .ring2s{position:absolute;inset:-5px;border-radius:50%;border:1.5px solid rgba(26,115,232,0.18);animation:ring 2.4s ease-out 0.8s infinite;}

    .icon-box-started {
      width:44px;height:44px;border-radius:14px;
      background:linear-gradient(145deg,#1a73e8,#0d47a1);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 0 0 1px rgba(26,115,232,0.25),0 6px 22px rgba(26,115,232,0.40);
    }
    .icon-box-scheduled {
      width:42px;height:42px;border-radius:13px;
      background:linear-gradient(145deg,#1a73e8,#0d47a1);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 0 0 1px rgba(26,115,232,0.25),0 6px 20px rgba(26,115,232,0.38);
    }

    /* title area */
    .title-area{flex:1;padding-top:2px;}
    .title-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;flex-wrap:wrap;}
    .title{font-size:14.5px;font-weight:800;letter-spacing:-.02em;color:#fff;}
    .title-sm{font-size:13.5px;font-weight:800;letter-spacing:-.02em;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;}

    /* live pill */
    .live-pill{display:inline-flex;align-items:center;gap:4px;background:rgba(234,67,53,0.15);border:1px solid rgba(234,67,53,0.30);border-radius:20px;padding:2px 7px;}
    .live-dot{width:6px;height:6px;border-radius:50%;background:#EA4335;box-shadow:0 0 5px rgba(234,67,53,0.8);animation:liveDot 1.5s ease-in-out infinite;display:inline-block;}
    .live-text{font-size:9.5px;font-weight:800;color:#EA4335;letter-spacing:.04em;}

    /* scheduled pill */
    .sched-pill{display:inline-flex;align-items:center;gap:4px;background:rgba(26,115,232,0.15);border:1px solid rgba(26,115,232,0.30);border-radius:20px;padding:2px 7px;flex-shrink:0;}
    .sched-dot{width:5px;height:5px;border-radius:50%;background:#4285F4;box-shadow:0 0 4px rgba(66,133,244,0.8);animation:calPulse 2s ease-in-out infinite;display:inline-block;}
    .sched-text{font-size:9px;font-weight:800;color:#4285F4;letter-spacing:.05em;}

    .subtitle{font-size:11px;color:rgba(255,255,255,0.42);font-weight:500;letter-spacing:.005em;}
    .subtitle-sm{font-size:10.5px;color:rgba(255,255,255,0.38);font-weight:500;}

    /* link row */
    .link-row{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:11px;margin-bottom:14px;background:rgba(26,115,232,0.07);border:1px solid rgba(26,115,232,0.16);overflow:hidden;}
    .link-row-sm{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:10px;margin-bottom:12px;background:rgba(26,115,232,0.07);border:1px solid rgba(26,115,232,0.15);overflow:hidden;}
    .g-icon{width:24px;height:24px;border-radius:6px;flex-shrink:0;background:rgba(26,115,232,0.14);display:flex;align-items:center;justify-content:center;}
    .g-icon-sm{width:22px;height:22px;border-radius:6px;flex-shrink:0;background:rgba(26,115,232,0.14);display:flex;align-items:center;justify-content:center;}
    .link-text{font-size:10.5px;color:rgba(26,115,232,0.85);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;font-family:monospace;}
    .link-text-sm{font-size:10px;color:rgba(26,115,232,0.80);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;font-family:monospace;}

    /* join button */
    .join-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px 0;border-radius:13px;background:linear-gradient(135deg,#1a73e8 0%,#1557b0 100%);color:#fff;font-weight:800;font-size:13.5px;letter-spacing:-.01em;text-decoration:none;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(26,115,232,0.38);position:relative;overflow:hidden;transition:transform .18s ease,box-shadow .18s ease;}
    .join-btn-sm{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:10px 0;border-radius:12px;background:linear-gradient(135deg,#1a73e8 0%,#1557b0 100%);color:#fff;font-weight:800;font-size:13px;letter-spacing:-.01em;text-decoration:none;border:none;cursor:pointer;box-shadow:0 4px 18px rgba(26,115,232,0.36);position:relative;overflow:hidden;transition:transform .16s ease,box-shadow .16s ease;}
    .join-btn::before,.join-btn-sm::before{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.20) 50%,transparent 60%);background-size:200% 100%;animation:shimmer 2.4s ease infinite;}
    .join-btn:hover,.join-btn-sm:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(26,115,232,0.50),0 2px 8px rgba(0,0,0,0.18);}
    .join-btn:active,.join-btn-sm:active{transform:translateY(0);}

    /* footer */
    .footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:11px;border-top:1px solid rgba(255,255,255,0.06);}
    .footer-text{font-size:10px;color:rgba(255,255,255,0.28);font-weight:500;}
    .footer-text-sm{font-size:9.5px;color:rgba(255,255,255,0.25);font-weight:500;}
    .google-dots{display:flex;align-items:center;gap:4px;}
    .gdot{width:5px;height:5px;border-radius:50%;opacity:.65;}
  </style>
</head>
<body>

  <!-- ── CARD 1: Meeting Started ── -->
  <div class="col">
    <p class="col-label">Meeting Started</p>
    <div class="card card-started">
      <div class="stripe"></div>
      <div class="glows"></div>

      <button class="close-btn" onclick="this.closest('.card').remove()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>

      <div class="body body-started">
        <div class="header">
          <div class="icon-wrap">
            <div class="ring1"></div>
            <div class="ring2"></div>
            <div class="icon-box-started">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M15 8h-8a1 1 0 00-1 1v6a1 1 0 001 1h8a1 1 0 001-1v-1.5l3 2.5V8.5L16 11V9a1 1 0 00-1-1z" fill="#fff"/>
              </svg>
            </div>
          </div>
          <div class="title-area">
            <div class="title-row">
              <span class="title">Meeting Started</span>
              <span class="live-pill"><span class="live-dot"></span><span class="live-text">LIVE</span></span>
            </div>
            <p class="subtitle">Join on Google Meet</p>
          </div>
        </div>

        <div class="link-row">
          <div class="g-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
          </div>
          <span class="link-text">https://meet.google.com/new</span>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
            <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3" stroke="rgba(26,115,232,0.45)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <a class="join-btn" href="https://meet.google.com/new" target="_blank">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M15 8h-8a1 1 0 00-1 1v6a1 1 0 001 1h8a1 1 0 001-1v-1.5l3 2.5V8.5L16 11V9a1 1 0 00-1-1z" fill="#fff"/>
          </svg>
          Join Google Meet
        </a>

        <div class="footer">
          <div style="display:flex;align-items:center;gap:5px;">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 7a4 4 0 100 8 4 4 0 000-8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="rgba(255,255,255,0.28)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="footer-text">Open to all channel members</span>
          </div>
          <div class="google-dots">
            <div class="gdot" style="background:#4285F4"></div>
            <div class="gdot" style="background:#EA4335"></div>
            <div class="gdot" style="background:#FBBC04"></div>
            <div class="gdot" style="background:#34A853"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── CARD 2: Meeting Scheduled ── -->
  <div class="col">
    <p class="col-label">Meeting Scheduled</p>
    <div class="card card-scheduled">
      <div class="stripe"></div>
      <div class="glows"></div>

      <div class="body body-scheduled">
        <div class="header-scheduled">
          <div class="icon-wrap">
            <div class="ring1s"></div>
            <div class="ring2s"></div>
            <div class="icon-box-scheduled">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="4" width="18" height="18" rx="3" stroke="#fff" stroke-width="2"/>
                <path d="M3 9h18" stroke="#fff" stroke-width="2"/>
                <path d="M8 2v4M16 2v4" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
                <circle cx="8"  cy="14" r="1.2" fill="#fff"/>
                <circle cx="12" cy="14" r="1.2" fill="#fff"/>
                <circle cx="16" cy="14" r="1.2" fill="#fff"/>
              </svg>
            </div>
          </div>

          <div style="flex:1;min-width:0;">
            <div class="title-row">
              <span class="title-sm">Team Standup</span>
              <span class="sched-pill"><span class="sched-dot"></span><span class="sched-text">SCHEDULED</span></span>
            </div>
            <p class="subtitle-sm">Google Meet · Click to join</p>
          </div>
        </div>

        <div class="link-row-sm">
          <div class="g-icon-sm">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
          </div>
          <span class="link-text-sm">https://meet.google.com/new</span>
        </div>

        <a class="join-btn-sm" href="https://meet.google.com/new" target="_blank">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
            <path d="M15 8h-8a1 1 0 00-1 1v6a1 1 0 001 1h8a1 1 0 001-1v-1.5l3 2.5V8.5L16 11V9a1 1 0 00-1-1z" fill="#fff"/>
          </svg>
          Join Google Meet
        </a>

        <div class="footer">
          <span class="footer-text-sm">Open to all members</span>
          <div class="google-dots">
            <div class="gdot" style="background:#4285F4"></div>
            <div class="gdot" style="background:#EA4335"></div>
            <div class="gdot" style="background:#FBBC04"></div>
            <div class="gdot" style="background:#34A853"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
