name: Frontend Check

on:
  push:
    branches: [main]
    paths:
      - 'packages/frontend/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run type-check
