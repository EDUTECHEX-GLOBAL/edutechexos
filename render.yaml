services:
  - type: web
    name: edutechexos-backend
    env: node
    # Build and run from the backend sub-folder so its own package.json
    # (which lists express, cors, socket.io, etc. as *dependencies*, not devDependencies)
    # is used — avoids production builds skipping devDeps from the root.
    buildCommand: cd packages/backend && npm install
    startCommand: cd packages/backend && node server.js
    healthCheckPath: /health
    envVars:
      # Required — set these in the Render dashboard (Environment tab)
      - key: MONGODB_URI
        sync: false
      # Enables Gemini AI features (Copilot). Must start with AIza…
      - key: GEMINI_API_KEY
        sync: false
      # Optional — OpenAI fallback
      - key: OPENAI_API_KEY
        sync: false
      # Brevo transactional email API key — required for email delivery.
      - key: BREVO_API_KEY
        sync: false
      # Sender address in "Name <email>" format (e.g. "EduTechExOS <noreply@edutechex.in>")
      - key: SMTP_FROM
        sync: false
      # JWT signing secret — MUST match the secret used when tokens were issued.
      # If not set, falls back to the hardcoded default (less secure).
      - key: JWT_SECRET
        sync: false
      # Brevo SMTP credentials — transactional email (no IP allowlist on SMTP relay)
      # Get SMTP login + key from Brevo → Settings → SMTP & API
